<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProxyYARP — 登录</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --accent-dim: #1f6feb;
      --text: #c9d1d9; --text-dim: #8b949e; --error: #f85149;
      --success: #3fb950; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.08) 0%, transparent 70%);
    }
    .card {
      width: 380px; padding: 40px 36px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo svg { width: 48px; height: 48px; }
    .logo h1 { font-size: 22px; font-weight: 700; margin-top: 12px; }
    .logo p { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: var(--accent-dim); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .btn:hover { background: var(--accent); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error { color: var(--error); font-size: 13px; margin-top: 12px; text-align: center; }
    .info { color: var(--text-dim); font-size: 12px; text-align: center; margin-top: 20px; }
    .spinner { display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px;
      vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js';

createApp({
  setup() {
    const key = ref('');
    const loading = ref(false);
    const error = ref('');

    async function login() {
      if (!key.value.trim()) { error.value = '请输入 API Key'; return; }
      loading.value = true; error.value = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: key.value.trim() })
        });
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('api_key', key.value.trim());
          localStorage.setItem('api_role', data.role);
          localStorage.setItem('api_name', data.name);
          window.location.href = '/index.html';
        } else {
          error.value = '认证失败，请检查 API Key';
        }
      } catch (e) {
        error.value = '网络错误，请重试';
      } finally {
        loading.value = false;
      }
    }

    function onKeydown(e) { if (e.key === 'Enter') login(); }

    return { key, loading, error, login, onKeydown };
  },
  template: `
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="22" stroke="#58a6ff" stroke-width="2" fill="none"/>
          <path d="M14 24 L24 14 L34 24 L24 34 Z" fill="#58a6ff" opacity="0.2"/>
          <path d="M24 8 L24 40 M8 24 L40 24" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
          <circle cx="24" cy="24" r="5" fill="#58a6ff"/>
        </svg>
        <h1>ProxyYARP</h1>
        <p>YARP 反向代理管理控制台</p>
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="password" v-model="key" placeholder="输入管理员 API Key"
          @keydown="onKeydown" :disabled="loading" />
      </div>
      <button class="btn" @click="login" :disabled="loading">
        <span v-if="loading"><span class="spinner"></span>验证中...</span>
        <span v-else>登 录</span>
      </button>
      <div v-if="error" class="error">{{ error }}</div>
      <div class="info">启动时控制台会显示初始 Admin Key</div>
    </div>
  `
}).mount('#app');
</script>
</body>
</html>
